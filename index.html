<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPEDIA PRO - Market Dashboard</title>
    <!-- Production CSS for Tailwind to avoid console warnings -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .bg-slate-900 { background-color: #0f172a; }
        .bg-indigo-600 { background-color: #4f46e5; }
        .border-slate-800 { border-color: #1e293b; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
    </style>
</head>
<body>
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <span class="font-black tracking-tighter text-xl text-white uppercase">EXPEDIA PRO</span>
        </div>
    </nav>

    <main class="p-6 max-w-6xl mx-auto w-full">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl text-center">
            <h1 class="text-3xl font-black mb-2">Market Dashboard</h1>
            <p class="text-gray-400 mb-6">Upload CSV to begin.</p>
            <input type="file" id="csv-up" class="hidden" accept=".csv" />
            <button onclick="document.getElementById('csv-up').click()" class="bg-indigo-600 px-8 py-4 rounded-2xl font-black text-sm">LOAD CSV DATA</button>
            <div id="results" class="mt-8 text-left space-y-4"></div>
        </div>
    </main>

    <script>
        // No external "Papa" library needed - using native parser
        document.getElementById('csv-up').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                
                const results = lines.slice(1).map(line => {
                    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, ''));
                    const row = {};
                    headers.forEach((h, i) => row[h] = values[i]);
                    return row;
                });

                render(results);
            };
            reader.readAsText(file);
        });

        function render(data) {
            const html = data.map(row => {
                const price = row['uitk-text_10'] || row['uitk-text_8'] || 'N/A';
                return `<div class="bg-black p-4 rounded-xl border border-slate-800">
                    <p class="text-xs text-indigo-400 font-bold uppercase">${row['uitk-heading-5'] || 'Other'}</p>
                    <p class="text-lg font-bold">${row['uitk-text'] || 'Vehicle'}</p>
                    <p class="text-xl font-black text-green-400">CA$${price}</p>
                </div>`;
            }).join('');
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
